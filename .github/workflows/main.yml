name: Release conf files

on:
  push:
    branches:
      - main

jobs:
  release-conf:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create tag
        id: tag
        run: |
          TAG="conf-$(date +'%Y%m%d-%H%M%S')"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create release and upload conf files
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Conf files ${{ steps.tag.outputs.tag }}"
          files: |
            **/*.conf
